  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped

    command:
      - "mongod" 
      - "--replSet"
      - "rs0"
      - "--bind_ip_all"
      - "--port"
      - "27018"

    ports:
      - "27018:27018"

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb

    entrypoint: >
      bash -c '
      if [ ! -f /data/configdb/mongo-keyfile ]; then
        openssl rand -base64 756 > /data/configdb/mongo-keyfile;
        chmod 400 /data/configdb/mongo-keyfile;
        chown 999:999 /data/configdb/mongo-keyfile;
      fi;
      exec docker-entrypoint.sh "$$@" --keyFile /data/configdb/mongo-keyfile
      '

    # Simplified healthcheck string execution to prevent shell variable splitting
    healthcheck:
      test: mongosh --port 27018 -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --quiet --eval "db.adminCommand({ping:1}).ok"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  mongodb-init-replica:
    image: mongo:7.0
    container_name: mongodb_init_replica
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

    # Switched variables to reference the environment directly to guarantee string parsing
    entrypoint: >
      bash -c '
      mongosh "mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27018/admin" --eval "
        try {
          if (!rs.status().ok) {
            rs.initiate({
              _id: \"rs0\",
              members: [{ _id: 0, host: \"127.0.0.1:27018\" }]
            });
          } else {
            print(\"Replica set already initialized\");
          }
        } catch (e) {
          rs.initiate({
            _id: \"rs0\",
            members: [{ _id: 0, host: \"127.0.0.1:27018\" }]
          });
        }
      "
      '
  
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  mongo_config:
  redis_data: