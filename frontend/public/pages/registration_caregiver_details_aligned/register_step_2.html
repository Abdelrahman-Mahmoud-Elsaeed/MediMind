<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MediMind - Caregiver Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#333538",
                        "tertiary-fixed-dim": "#fabb5e",
                        "on-secondary": "#0a3900",
                        "outline-variant": "#41474f",
                        "on-secondary-fixed": "#042100",
                        "secondary-container": "#225113",
                        "on-tertiary-fixed-variant": "#624000",
                        "on-primary": "#003352",
                        "surface-bright": "#37393d",
                        "error": "#ffb4ab",
                        "background": "#111316",
                        "on-surface": "#e2e2e6",
                        "primary-fixed-dim": "#95ccff",
                        "primary-fixed": "#cde5ff",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#c38b33",
                        "surface": "#111316",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "inverse-on-surface": "#2f3034",
                        "on-primary-fixed": "#001d32",
                        "surface-container-high": "#282a2d",
                        "on-tertiary": "#452b00",
                        "on-tertiary-container": "#422900",
                        "on-primary-fixed-variant": "#004a75",
                        "surface-tint": "#95ccff",
                        "outline": "#8b919a",
                        "inverse-primary": "#166396",
                        "surface-dim": "#111316",
                        "on-surface-variant": "#c1c7d0",
                        "surface-container-lowest": "#0c0e11",
                        "on-primary-container": "#00314f",
                        "surface-container-low": "#1a1c1f",
                        "on-tertiary-fixed": "#291800",
                        "tertiary-fixed": "#ffddb3",
                        "tertiary": "#fabb5e",
                        "on-secondary-container": "#8ec378",
                        "secondary-fixed-dim": "#9fd588",
                        "primary": "#95ccff",
                        "inverse-surface": "#e2e2e6",
                        "primary-container": "#5c9bd1",
                        "surface-variant": "#333538",
                        "secondary-fixed": "#baf2a1",
                        "surface-container": "#1e2023",
                        "secondary": "#9fd588",
                        "on-secondary-fixed-variant": "#225113",
                        "on-background": "#e2e2e6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "unit": "8px",
                        "gutter": "24px",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "headline-lg": ["Manrope"],
                        "body-md": ["Inter"],
                        "headline-md": ["Manrope"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "display-lg": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111316; /* base background */
            color: #e2e2e6;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Manrope', sans-serif;
        }
        
        /* Subtle glow effect for active states/focus */
        .glow-primary:focus-within {
            box-shadow: 0 0 0 2px rgba(149, 204, 255, 0.3);
            border-color: #95ccff;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Simplified for Registration - Content Canvas Priority) -->
<header class="w-full flex justify-center py-6 md:py-8 z-10 relative">
<img alt="MediMind Logo" class="h-12 w-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-OugZQPn5PYc6lK1g2NgI6-0NcCxKaNLvBpSeA0B0oc6uFyAmJJuQo6Bnzyu2nKJhAk0UWSeHYkE2bGlsnCt3Jx92b0fCfN_4wtCu3oGHGJ_g4bdZUjLsRMcyAxNDk7W2mdxKjW8STG_-SEwQ8vqVfg04cXdgJ-53v8rBxBrwi_I8x68F2qbWoMw_F5s2bFq0RZ1iYrIpHsH1erlyWqi83HcFY1ZYpkz09WGIX-1jFrTz4wfNpO3fgQ"/>
</header>
<!-- Main Registration Container -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop w-full relative z-10">
<div class="w-full max-w-[480px] bg-surface-container-low border border-outline-variant/30 rounded-xl shadow-2xl p-6 md:p-10 backdrop-blur-md relative overflow-hidden">
<!-- Subtle background accent inside card -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="mb-8 text-center">
<div class="mb-6">
<div class="flex justify-between items-center mb-2">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">Step 2 of 2</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Profile Details</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-full bg-primary rounded-full"></div>
</div>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary-fixed-dim tracking-tight mb-2">Complete Your Profile</h1>
<!-- Role Badge -->
<div class="inline-flex items-center gap-1.5 mt-2 px-3 py-1 bg-surface-variant/50 rounded-full border border-surface-variant">
<span class="material-symbols-outlined text-[16px] text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">medical_information</span>
<span class="font-label-sm text-label-sm text-on-surface">Registering as Caregiver</span>
</div>
</div>
<form action="#" class="space-y-6" method="POST">
<!-- Form Fields -->
<div class="space-y-4">
<!-- First Name Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="firstName">First Name</label>
<div class="relative rounded-lg bg-surface border border-outline-variant/50 transition-all glow-primary">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-opacity-70 text-[20px]">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 placeholder-on-surface-variant/50 rounded-lg" id="firstName" name="firstName" placeholder="Enter your first name" required="" type="text"/>
</div>
</div>
<!-- Last Name Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="lastName">Last Name</label>
<div class="relative rounded-lg bg-surface border border-outline-variant/50 transition-all glow-primary">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-opacity-70 text-[20px]">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 placeholder-on-surface-variant/50 rounded-lg" id="lastName" name="lastName" placeholder="Enter your last name" required="" type="text"/>
</div>
</div>
<!-- Phone Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="phone">Phone Number</label>
<div class="relative rounded-lg bg-surface border border-outline-variant/50 transition-all glow-primary">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-opacity-70 text-[20px]">call</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 placeholder-on-surface-variant/50 rounded-lg" id="phone" name="phone" placeholder="(555) 000-0000" required="" type="tel"/>
</div>
</div>
</div>
<!-- Submit Action -->
<div class="pt-4">
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md bg-gradient-to-r from-primary to-primary-container text-on-primary-container hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-background transition-all" type="submit">
                        Complete Registration
                        <span class="material-symbols-outlined ml-2 text-[20px]">arrow_forward</span>
</button>
<div class="text-center mt-4">
<button class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors" type="button">
                Back to Step 1
            </button>
</div>
<p class="mt-4 text-center font-body-md text-label-sm text-on-surface-variant flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">lock</span> Your data is securely encrypted
</p>
</div>
</form>
</div>
</main>
<!-- Optional: Subtle ambient background element for the whole page -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[100px] transform translate-x-[-20%] translate-y-[20%]"></div>
</div>
</body></html>
