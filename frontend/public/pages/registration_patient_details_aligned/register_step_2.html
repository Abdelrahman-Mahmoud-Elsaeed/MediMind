<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MediMind - Patient Registration Step 2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface": "#111316",

                        "inverse-on-surface": "#2f3034",
                        "on-primary-fixed": "#001d32",
                        "surface-container-high": "#282a2d",

                        "on-tertiary-container": "#422900",
                        "on-primary-fixed-variant": "#004a75",

                        "primary-container": "#5c9bd1",

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111316; /* base background */
            color: #e2e2e6;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Manrope', sans-serif;
        }
        
        /* Subtle glow effect for active states/focus */
        .glow-primary:focus-within {
            box-shadow: 0 0 0 2px rgba(149, 204, 255, 0.3);
            border-color: #95ccff;
        }
        /* Custom styles for native date picker icon hiding in webkit */
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Simplified for Registration - Content Canvas Priority) -->
<header class="w-full flex justify-center py-6 md:py-8 z-10 relative">
<img alt="MediMind Logo" class="h-12 w-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-OugZQPn5PYc6lK1g2NgI6-0NcCxKaNLvBpSeA0B0oc6uFyAmJJuQo6Bnzyu2nKJhAk0UWSeHYkE2bGlsnCt3Jx92b0fCfN_4wtCu3oGHGJ_g4bdZUjLsRMcyAxNDk7W2mdxKjW8STG_-SEwQ8vqVfg04cXdgJ-53v8rBxBrwi_I8x68F2qbWoMw_F5s2bFq0RZ1iYrIpHsH1erlyWqi83HcFY1ZYpkz09WGIX-1jFrTz4wfNpO3fgQ"/>
</header>
<!-- Main Registration Container -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop w-full relative z-10">
<div class="w-full max-w-[480px] bg-surface-container-low border border-outline-variant/30 rounded-xl shadow-2xl p-6 md:p-10 backdrop-blur-md relative overflow-hidden">
<!-- Subtle background accent inside card -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="mb-8 text-center">
<div class="mb-6">
<div class="flex justify-between items-center mb-2">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">Step 2 of 2</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Profile Details</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-full bg-primary rounded-full"></div>
</div>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary-fixed-dim tracking-tight mb-2">Complete Your Profile</h1>
<!-- Role Badge -->
<div class="inline-flex items-center gap-1.5 px-3 py-1 mt-2 bg-surface-variant border border-outline-variant/50 text-on-surface-variant font-label-sm text-label-sm rounded-full shadow-inner">
<span class="material-symbols-outlined text-[16px]">person</span>
                      Registering as Patient
                  </div>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-8">
<!-- Personal Information Group -->
<fieldset class="flex flex-col gap-5">
<legend class="font-body-lg text-body-lg text-primary-fixed-dim border-b border-outline-variant/30 pb-2 w-full mb-2">Personal Information</legend>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<!-- First Name -->
<div class="flex flex-col gap-1.5">
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="firstName">First Name <span class="text-error">*</span></label>
<div class="relative rounded-lg bg-surface border border-outline-variant/50 transition-all glow-primary">
<input class="block w-full px-3 py-2.5 bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 placeholder-on-surface-variant/50 rounded-lg" id="firstName" placeholder="Enter first name" required="" type="text"/>
</div>
</div>
<!-- Last Name -->
<div class="flex flex-col gap-1.5">
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="lastName">Last Name <span class="text-error">*</span></label>
<div class="relative rounded-lg bg-surface border border-outline-variant/50 transition-all glow-primary">
<input class="block w-full px-3 py-2.5 bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 placeholder-on-surface-variant/50 rounded-lg" id="lastName" placeholder="Enter last name" required="" type="text"/>
</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<!-- Phone Number -->
<div class="flex flex-col gap-1.5">
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="phone">Phone Number <span class="text-error">*</span></label>
<div class="relative rounded-lg bg-surface border border-outline-variant/50 transition-all glow-primary">
<input class="block w-full px-3 py-2.5 bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 placeholder-on-surface-variant/50 rounded-lg" id="phone" placeholder="(555) 000-0000" required="" type="tel"/>
</div>
<p class="font-label-sm text-label-sm text-outline flex items-center gap-1 mt-1"><span class="material-symbols-outlined text-[14px]">notifications_active</span> Used for secure SMS alerts</p>
</div>
<!-- Date of Birth -->
<div class="flex flex-col gap-1.5">
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="dob">Date of Birth</label>
<div class="relative rounded-lg bg-surface border border-outline-variant/50 transition-all glow-primary">
<input class="block w-full px-3 py-2.5 bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 shadow-inner appearance-none relative z-10 rounded-lg" id="dob" type="date"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-opacity-70 z-0">calendar_month</span>
</div>
</div>
</div>
<!-- Blood Type -->
<div class="flex flex-col gap-1.5 md:w-[calc(50%-10px)]">
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="bloodType">Blood Type</label>
<div class="relative rounded-lg bg-surface border border-outline-variant/50 transition-all glow-primary">
<select class="block w-full px-3 py-2.5 bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 shadow-inner appearance-none cursor-pointer rounded-lg" id="bloodType">
<option class="text-outline" disabled="" selected="" value="">Select Type</option>
<option value="A+">A+</option>
<option value="A-">A-</option>
<option value="B+">B+</option>
<option value="B-">B-</option>
<option value="AB+">AB+</option>
<option value="AB-">AB-</option>
<option value="O+">O+</option>
<option value="O-">O-</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-opacity-70 pointer-events-none">expand_more</span>
</div>
</div>
</fieldset>
<!-- Emergency Contact Group (Bento-style inset) -->
<fieldset class="flex flex-col gap-4 bg-surface/50 p-5 rounded-xl border border-surface-bright shadow-inner">
<legend class="sr-only">Emergency Contact</legend>
<div class="flex items-center gap-2 mb-1">
<div class="w-8 h-8 rounded-full bg-error-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-error">emergency</span>
</div>
<h3 class="font-label-md text-label-md text-on-surface">Emergency Contact</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="block font-label-sm text-label-sm text-on-surface mb-1.5" for="emName">Contact Name</label>
<div class="relative rounded-lg bg-surface border border-outline-variant/50 transition-all glow-primary focus-within:border-error focus-within:shadow-[0_0_0_2px_rgba(255,180,171,0.3)]">
<input class="block w-full px-3 py-2.5 bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 placeholder-on-surface-variant/50 rounded-lg" id="emName" placeholder="Full name" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="block font-label-sm text-label-sm text-on-surface mb-1.5" for="emPhone">Contact Phone</label>
<div class="relative rounded-lg bg-surface border border-outline-variant/50 transition-all glow-primary focus-within:border-error focus-within:shadow-[0_0_0_2px_rgba(255,180,171,0.3)]">
<input class="block w-full px-3 py-2.5 bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 placeholder-on-surface-variant/50 rounded-lg" id="emPhone" placeholder="(555) 000-0000" type="tel"/>
</div>
</div>
</div>
</fieldset>
<!-- Actions -->
<div class="pt-2 flex flex-col gap-4">
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md bg-gradient-to-r from-primary to-primary-container text-on-primary-container hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-background transition-all group" type="button">
                    Complete Registration
                    <span class="material-symbols-outlined text-[20px] ml-2 group-hover:translate-x-1 transition-transform">check_circle</span>
</button>
<div class="flex items-center justify-center gap-1 font-label-sm text-label-sm text-outline">
<span class="material-symbols-outlined text-[14px]">lock</span>
<p>Your data is securely encrypted.</p>
</div>
</div>
</form>
</div>
</main>
<!-- Optional: Subtle ambient background element for the whole page -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[100px] transform translate-x-[-20%] translate-y-[20%]"></div>
</div>
</body></html>
