<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-surface');
            -webkit-font-smoothing: antialiased;
        }
        .glass-panel {
            background: theme('colors.surface-container/50');
            backdrop-filter: blur(16px);
            border: 1px solid theme('colors.outline-variant/30');
        }
        .input-glow:focus-within {
            box-shadow: 0 0 0 1px theme('colors.primary'), 0 0 12px 0 theme('colors.primary/20');
            border-color: theme('colors.primary');
        }
    </style>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-background">
<!-- Ambient Background Effects -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[100px]"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<div class="glass-panel rounded-xl p-8 shadow-2xl flex flex-col items-center">
<!-- Logo area -->
<div class="mb-8 w-32 h-32 flex items-center justify-center">
<img alt="MediMind Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-OugZQPn5PYc6lK1g2NgI6-0NcCxKaNLvBpSeA0B0oc6uFyAmJJuQo6Bnzyu2nKJhAk0UWSeHYkE2bGlsnCt3Jx92b0fCfN_4wtCu3oGHGJ_g4bdZUjLsRMcyAxNDk7W2mdxKjW8STG_-SEwQ8vqVfg04cXdgJ-53v8rBxBrwi_I8x68F2qbWoMw_F5s2bFq0RZ1iYrIpHsH1erlyWqi83HcFY1ZYpkz09WGIX-1jFrTz4wfNpO3fgQ">
</div>
<div class="text-center mb-8 w-full">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to continue to your care portal</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-5" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative input-glow rounded-lg transition-all duration-200 bg-surface-container-high border border-outline-variant/50">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">mail</span>
</div>
<input class="block w-full pl-10 py-3 bg-transparent border-none rounded-lg text-on-surface focus:ring-0 font-body-md placeholder-outline-variant" id="email" placeholder="provider@medimind.com" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative input-glow rounded-lg transition-all duration-200 bg-surface-container-high border border-outline-variant/50">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">lock</span>
</div>
<input class="block w-full pl-10 py-3 bg-transparent border-none rounded-lg text-on-surface focus:ring-0 font-body-md placeholder-outline-variant" id="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full py-3 px-4 bg-primary text-on-primary font-label-md text-label-md rounded-lg shadow-lg shadow-primary/20 hover:bg-primary-fixed hover:shadow-primary/30 active:scale-[0.98] transition-all duration-200 flex justify-center items-center gap-2 mt-6" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
<!-- Sign Up Link -->
<div class="mt-8 text-center font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary hover:text-primary-fixed font-label-md font-semibold ml-1 transition-colors" href="#">Sign Up</a>
</div>
</div>
</main>
<script>
        // Simple script to handle password visibility toggle
        document.addEventListener('DOMContentLoaded', () => {
            const togglePasswordBtn = document.querySelector('button[type="button"]');
            const passwordInput = document.getElementById('password');
            const iconSpan = togglePasswordBtn.querySelector('span');

            togglePasswordBtn.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    iconSpan.textContent = 'visibility';
                } else {
                    passwordInput.type = 'password';
                    iconSpan.textContent = 'visibility_off';
                }
            });
        });
    </script>


</body></html>
