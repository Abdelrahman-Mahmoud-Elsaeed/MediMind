<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Add Medication - MediMind</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(139, 145, 154, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 145, 154, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Task-Focused: Minimal, no standard nav) -->
<header class="bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-lg docked full-width top-0 sticky border-b border-outline-variant/30 flat no shadows flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-16 z-40">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="p-2 rounded-full hover:bg-surface-variant/50 transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md tracking-tight text-primary dark:text-primary-fixed-dim">Add Medication</h1>
</div>
<div>
<!-- Empty trailing for balance -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex justify-center py-8 px-margin-mobile md:px-margin-desktop w-full max-w-container-max mx-auto">
<!-- Form Container -->
<div class="w-full max-w-2xl bg-surface-container-low border border-outline-variant/20 rounded-xl shadow-2xl p-6 md:p-8 flex flex-col gap-8 relative overflow-hidden">
<!-- Subtle background accent -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-[80px] -translate-y-1/2 translate-x-1/4 pointer-events-none"></div>
<!-- Section 1: Identification -->
<section class="flex flex-col gap-6 relative z-10">
<div class="flex items-center gap-3 pb-2 border-b border-outline-variant/20">
<span class="material-symbols-outlined text-primary" data-icon="info">info</span>
<h2 class="font-headline-md text-headline-md text-on-surface">Medication Details</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="col-span-1 md:col-span-2 relative">
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="med-name">Medication Name</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant/40 rounded-lg py-3 px-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors pr-12 shadow-inner" id="med-name" placeholder="e.g. Lisinopril" type="text"/>
<button aria-label="Scan Label" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-primary hover:bg-primary/10 rounded-md transition-colors tooltip-trigger">
<span class="material-symbols-outlined" data-icon="document_scanner">document_scanner</span>
</button>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="form-type">Form Type</label>
<select class="w-full bg-surface border border-outline-variant/40 rounded-lg py-3 px-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none shadow-inner" id="form-type">
<option value="">Select form...</option>
<option value="tablet">Tablet</option>
<option value="capsule">Capsule</option>
<option value="liquid">Liquid</option>
<option value="injection">Injection</option>
<option value="inhaler">Inhaler</option>
<option value="drops">Drops</option>
</select>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="linked-condition">Linked Condition</label>
<select class="w-full bg-surface border border-outline-variant/40 rounded-lg py-3 px-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none shadow-inner" id="linked-condition">
<option value="">Select condition...</option>
<option value="hypertension">Hypertension</option>
<option value="diabetes">Type 2 Diabetes</option>
<option value="asthma">Asthma</option>
<option value="other">Other</option>
</select>
</div>
</div>
</section>
<!-- Section 2: Schedule -->
<section class="flex flex-col gap-6 relative z-10">
<div class="flex items-center gap-3 pb-2 border-b border-outline-variant/20">
<span class="material-symbols-outlined text-primary" data-icon="schedule">schedule</span>
<h2 class="font-headline-md text-headline-md text-on-surface">Schedule</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="frequency">Frequency</label>
<select class="w-full bg-surface border border-outline-variant/40 rounded-lg py-3 px-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none shadow-inner" id="frequency">
<option value="daily">Daily</option>
<option value="twice_daily">Twice Daily</option>
<option value="weekly">Weekly</option>
<option value="as_needed">As Needed (PRN)</option>
</select>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="doses">Dose per intake</label>
<div class="flex gap-2">
<input class="w-full bg-surface border border-outline-variant/40 rounded-lg py-3 px-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-inner" id="doses" min="0.5" placeholder="1" step="0.5" type="number"/>
<div class="flex items-center px-4 bg-surface-variant rounded-lg border border-outline-variant/20 text-on-surface-variant font-label-md text-label-md">
                                mg
                            </div>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="start-date">Start Date</label>
<input class="w-full bg-surface border border-outline-variant/40 rounded-lg py-3 px-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-inner" id="start-date" type="date"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="end-date">End Date (Optional)</label>
<input class="w-full bg-surface border border-outline-variant/40 rounded-lg py-3 px-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-inner" id="end-date" type="date"/>
</div>
</div>
</section>
<!-- Section 3: Inventory -->
<section class="flex flex-col gap-6 relative z-10">
<div class="flex items-center gap-3 pb-2 border-b border-outline-variant/20">
<span class="material-symbols-outlined text-primary" data-icon="inventory_2">inventory_2</span>
<h2 class="font-headline-md text-headline-md text-on-surface">Inventory Tracking</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="current-inventory">Current Quantity</label>
<input class="w-full bg-surface border border-outline-variant/40 rounded-lg py-3 px-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-inner" id="current-inventory" placeholder="30" type="number"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="refill-threshold">Refill Alert Threshold</label>
<input class="w-full bg-surface border border-outline-variant/40 rounded-lg py-3 px-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-inner" id="refill-threshold" placeholder="7" type="number"/>
</div>
</div>
</section>
<!-- Actions -->
<div class="mt-8 pt-6 border-t border-outline-variant/20 flex flex-col sm:flex-row justify-end gap-4 relative z-10">
<button class="px-6 py-3 rounded-lg border border-outline-variant text-on-surface hover:bg-surface-variant/50 transition-colors font-label-md text-label-md text-center" type="button">
                    Cancel
                </button>
<button class="px-6 py-3 rounded-lg bg-gradient-to-r from-primary to-primary-container text-on-primary font-label-md text-label-md text-center hover:opacity-90 transition-opacity shadow-[0_0_15px_rgba(149,204,255,0.3)]" type="button">
                    Save Medication
                </button>
</div>
</div>
</main>
<!-- Task-focused screen: BottomNavBar & NavigationDrawer are intentionally suppressed per Semantic Shell Mandate -->
</body></html>
